<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    background: #1e1e2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden; user-select: none;
    -webkit-app-region: drag;
  }
  .logo {
    font-size: 52px; font-weight: 900; color: #cba6f7;
    letter-spacing: -2px; margin-bottom: 8px;
  }
  .logo span { color: #7c5cfc; }
  .tagline {
    font-size: 13px; color: #585b70; margin-bottom: 48px;
    letter-spacing: 0.05em;
  }
  .spinner-wrap { position: relative; width: 48px; height: 48px; margin-bottom: 20px; }
  .spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid #313244;
    border-top-color: #7c5cfc;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    font-size: 12px; color: #45475a;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  .version { position: fixed; bottom: 16px; right: 16px; font-size: 10px; color: #313244; }
</style>
</head>
<body>
  <div class="logo">⚡ Query<span>Lux</span></div>
  <div class="tagline">AI-powered SQL Workspace</div>
  <div class="spinner-wrap"><div class="spinner"></div></div>
  <div class="status" id="status">Starting server…</div>
  <div class="version" id="version"></div>
  <script>
    const { ipcRenderer } = require('electron')
    ipcRenderer.on('status', (_, msg) => {
      document.getElementById('status').textContent = msg
    })
    ipcRenderer.on('version', (_, v) => {
      document.getElementById('version').textContent = `v${v}`
    })
  </script>
</body>
</html>
