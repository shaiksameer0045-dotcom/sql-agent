version: "3.9"

# Spin up test databases for QueryLux end-to-end testing.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   ./run_tests.sh
#   docker compose -f docker-compose.test.yml down -v

services:
  test-postgres:
    image: postgres:16-alpine
    container_name: ql-test-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-mysql:
    image: mysql:8.0
    container_name: ql-test-mysql
    environment:
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "testuser", "--password=testpass"]
      interval: 5s
      timeout: 5s
      retries: 15

  test-mariadb:
    image: mariadb:11
    container_name: ql-test-mariadb
    environment:
      MARIADB_USER: testuser
      MARIADB_PASSWORD: testpass
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: testdb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "testuser", "--password=testpass"]
      interval: 5s
      timeout: 5s
      retries: 15
